    sync-to-gh:
      - step:
          name: Sync GitHub Mirror
          image: alpine/git:latest
          clone:
            enabled: false
          script:
            - git clone --bare git@bitbucket.org:addaxis/ics-pipelines-deployment.git
            - cd ics-pipelines-deployment.git
            - git push --mirror git@github.com:addaxis/ics-bitbucket-mirror.git
